<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>星火灵犀 · 个人AI聊天室</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #e0eaf4 0%, #cfdef3 100%);
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, 'BlinkMacSystemFont', 'Roboto', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .chat-app {
            max-width: 1100px;
            width: 100%;
            height: 85vh;
            min-height: 600px;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25), 0 2px 5px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.6);
            transition: all 0.2s ease;
        }

        .chat-header {
            padding: 1rem 1.8rem;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(4px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-icon {
            background: #0077ff;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 4px 8px rgba(0, 119, 255, 0.2);
        }

        .brand h1 {
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1f2b3c, #2c3e66);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .model-badge {
            background: rgba(0, 119, 255, 0.12);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #0066cc;
            backdrop-filter: blur(2px);
            border: 0.5px solid rgba(0, 119, 255, 0.2);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem 1.8rem;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            scroll-behavior: smooth;
        }

        .messages-container::-webkit-scrollbar {
            width: 5px;
        }
        .messages-container::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.05);
            border-radius: 10px;
        }
        .messages-container::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
        }

        .message {
            display: flex;
            gap: 12px;
            max-width: 85%;
            animation: fadeSlideUp 0.2s ease-out;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.assistant {
            align-self: flex-start;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: 600;
            flex-shrink: 0;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .user .avatar {
            background: #0077ff;
            color: white;
        }

        .assistant .avatar {
            background: white;
            color: #1f2b3c;
            border: 1px solid #e2e8f0;
        }

        .bubble {
            background: white;
            padding: 0.85rem 1.2rem;
            border-radius: 1.5rem;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
            font-size: 0.95rem;
            line-height: 1.45;
            color: #1e293b;
            word-break: break-word;
            white-space: pre-wrap;
            border: 1px solid rgba(0,0,0,0.03);
        }

        .user .bubble {
            background: #0077ff;
            color: white;
            border-bottom-right-radius: 0.3rem;
        }

        .assistant .bubble {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(2px);
            border-bottom-left-radius: 0.3rem;
        }

        .typing-indicator {
            display: flex;
            gap: 5px;
            align-items: center;
            padding: 0.6rem 1rem;
            background: rgba(255,255,255,0.8);
            border-radius: 2rem;
            width: fit-content;
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #6c86a3;
            border-radius: 50%;
            display: inline-block;
            animation: blink 1.4s infinite both;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink {
            0%, 80%, 100% { opacity: 0.3; transform: scale(0.8);}
            40% { opacity: 1; transform: scale(1);}
        }

        .input-area {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            padding: 1rem 1.5rem 1.5rem;
            border-top: 1px solid rgba(0, 0, 0, 0.08);
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            background: white;
            border-radius: 2rem;
            padding: 0.3rem 0.3rem 0.3rem 1.2rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03), 0 0 0 1px rgba(0,0,0,0.02);
            transition: box-shadow 0.2s;
        }
        .input-wrapper:focus-within {
            box-shadow: 0 4px 12px rgba(0, 119, 255, 0.15), 0 0 0 2px rgba(0, 119, 255, 0.2);
        }

        textarea {
            flex: 1;
            border: none;
            resize: none;
            padding: 0.9rem 0;
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            max-height: 120px;
            background: transparent;
        }

        button {
            background: #0077ff;
            border: none;
            border-radius: 2rem;
            padding: 0.7rem 1.4rem;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: inherit;
        }
        button:hover {
            background: #0066dd;
            transform: scale(0.97);
        }
        button:active {
            transform: scale(0.95);
        }
        button:disabled {
            background: #a0c2e8;
            cursor: not-allowed;
            transform: none;
        }

        .info-footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 8px;
            color: #4a5b6e;
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 640px) {
            .chat-app { height: 90vh; border-radius: 1.2rem; }
            .message { max-width: 95%; }
            .messages-container { padding: 1rem; }
            .brand h1 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<div class="chat-app">
    <div class="chat-header">
        <div class="brand">
            <div class="brand-icon">✨</div>
            <h1>星火灵犀</h1>
        </div>
        <div class="model-badge">讯飞星火 · Spark Lite</div>
    </div>

    <div class="messages-container" id="messagesContainer">
        <div class="message assistant">
            <div class="avatar"></div>
            <div class="bubble">你好呀！我是讯飞星火AI助手～有什么可以帮你的？</div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <textarea id="userInput" placeholder="输入消息... (Enter发送，Shift+Enter换行)" rows="1"></textarea>
            <button id="sendBtn"><span>➤</span> 发送</button>
        </div>
        <div class="info-footer">基于讯飞星火大模型API | 个人AI聊天室</div>
    </div>
</div>

<script>
//
const APPID = "7fdc7acf";
const API_SECRET = "NWU4NzI4MDFkMmJlYTRmYjViMzA2ODVh";
const API_KEY = "9d0d04fccb559bd09cab18780d508613";

const HOST_URL = "spark-api.xf-yun.com";
const API_PATH = "/v1.1/chat";

let conversationHistory = [
    { role: "system", content: "你是一位智能助手，简洁准确、乐于助人。" }
];

const messagesContainer = document.getElementById('messagesContainer');
const userInputEl = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
let isWaitingForResponse = false;
let typingIndicatorDiv = null;
let currentAssistantMessageDiv = null;
let currentAssistantContent = "";

function addMessageToUI(role, content) {
    const messageDiv = document.createElement('div');
    messageDiv.className = `message ${role}`;
    const avatarDiv = document.createElement('div');
    avatarDiv.className = 'avatar';
    avatarDiv.innerText = role === 'user' ? '' : '✨';
    const bubbleDiv = document.createElement('div');
    bubbleDiv.className = 'bubble';
    bubbleDiv.innerText = content;
    messageDiv.appendChild(avatarDiv);
    messageDiv.appendChild(bubbleDiv);
    messagesContainer.appendChild(messageDiv);
    scrollToBottom();
}

function showTypingIndicator() {
    if (typingIndicatorDiv) return;
    const wrapper = document.createElement('div');
    wrapper.className = 'message assistant';
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.innerText = '✨';
    const bubble = document.createElement('div');
    bubble.className = 'bubble typing-indicator';
    bubble.innerHTML = '<span></span><span></span><span></span>';
    wrapper.appendChild(avatar);
    wrapper.appendChild(bubble);
    messagesContainer.appendChild(wrapper);
    typingIndicatorDiv = wrapper;
    scrollToBottom();
}

function hideTypingIndicator() {
    if (typingIndicatorDiv) {
        typingIndicatorDiv.remove();
        typingIndicatorDiv = null;
    }
}

function scrollToBottom() {
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
}

function initStreamingMessage() {
    const msg = document.createElement('div');
    msg.className = 'message assistant';
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.innerText = '✨';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    msg.appendChild(avatar);
    msg.appendChild(bubble);
    messagesContainer.appendChild(msg);
    currentAssistantMessageDiv = msg;
    currentAssistantContent = "";
    scrollToBottom();
}

function appendStreamingText(text) {
    if (!currentAssistantMessageDiv) return;
    const b = currentAssistantMessageDiv.querySelector('.bubble');
    currentAssistantContent += text;
    b.innerText = currentAssistantContent;
    scrollToBottom();
}

function finalizeStreamingMessage() {
    if (currentAssistantContent) {
        conversationHistory.push({ role: "assistant", content: currentAssistantContent });
    }
    currentAssistantMessageDiv = null;
    currentAssistantContent = "";
}

async function sendUserMessage() {
    if (isWaitingForResponse) return;
    const text = userInputEl.value.trim();
    if (!text) return;

    userInputEl.value = "";
    userInputEl.style.height = 'auto';
    addMessageToUI('user', text);
    showTypingIndicator();
    isWaitingForResponse = true;
    sendBtn.disabled = true;

    try {
        hideTypingIndicator();
        initStreamingMessage();
        await callSparkLite(text);
        finalizeStreamingMessage();
    } catch (e) {
        hideTypingIndicator();
        if (currentAssistantMessageDiv) currentAssistantMessageDiv.remove();
        addMessageToUI('assistant', '❌ 连接失败：请检查APPID、密钥或网络');
        console.error(e);
    } finally {
        isWaitingForResponse = false;
        sendBtn.disabled = false;
        scrollToBottom();
        userInputEl.focus();
    }
}

async function callSparkLite(msg) {
    conversationHistory.push({ role: "user", content: msg });
    const date = new Date().toUTCString();
    const signatureOrigin = `host: ${HOST_URL}\ndate: ${date}\nGET ${API_PATH} HTTP/1.1`;

    const enc = new TextEncoder();
    const key = await crypto.subtle.importKey('raw', enc.encode(API_SECRET), { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']);
    const sigBuf = await crypto.subtle.sign('HMAC', key, enc.encode(signatureOrigin));
    const signature = btoa(String.fromCharCode(...new Uint8Array(sigBuf)));

    const authRaw = `api_key="${API_KEY}", algorithm="hmac-sha256", headers="host date request-line", signature="${signature}"`;
    const authorization = btoa(unescape(encodeURIComponent(authRaw)));

    const wsUrl = `wss://${HOST_URL}${API_PATH}?authorization=${authorization}&date=${encodeURIComponent(date)}&host=${HOST_URL}`;

    return new Promise((resolve, reject) => {
        const ws = new WebSocket(wsUrl);
        let full = "";

        ws.onopen = () => {
            ws.send(JSON.stringify({
                header: { app_id: APPID, uid: "user" },
                parameter: { chat: { domain: "lite", temperature: 0.7, max_tokens: 2048 } },
                payload: { message: { text: conversationHistory } }
            }));
        };

        ws.onmessage = (e) => {
            const d = JSON.parse(e.data);
            if (d.header.code !== 0) {
                reject(d.header.message);
                ws.close();
                return;
            }
            const t = d.payload?.choices?.text?.[0]?.content || "";
            full += t;
            appendStreamingText(t);
            if (d.header.status === 2) {
                ws.close();
                resolve(full);
            }
        };

        ws.onerror = () => reject("WebSocket 连接失败");
        ws.onclose = () => resolve(full);
        setTimeout(() => { ws.close(); reject("超时"); }, 30000);
    });
}

userInputEl.addEventListener('input', () => {
    userInputEl.style.height = 'auto';
    userInputEl.style.height = Math.min(userInputEl.scrollHeight, 120) + 'px';
});

userInputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendUserMessage();
    }
});

sendBtn.addEventListener('click', sendUserMessage);
userInputEl.focus();
</script>
</body>
</html>
